pre-commit:
  jobs:
    - name: lint-fix
      glob: '*.{js,ts,tsx,jsx}'
      run: bunx oxlint --fix {staged_files}
      stage_fixed: true
    - name: fmt-fix
      glob: '*.{js,ts,tsx,jsx,json,css,md,yml,yaml}'
      run: bunx oxfmt {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: bumpy-check
      run: bunx @varlock/bumpy check --hook pre-push
