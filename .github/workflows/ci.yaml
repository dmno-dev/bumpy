name: CI
on: pull_request

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: cd packages/bumpy && bunx varlock load # need ENV types for tsdown config file
      - run: bun run check
      - run: git config --global user.name "CI" && git config --global user.email "ci@test"
      - run: bun run test

  bumpy-check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      # Build first since we use the local workspace package instead of the published one
      - run: bun run --filter @varlock/bumpy build
      # run bun install again to make the now built CLI available
      - run: bun install
      - run: bunx @varlock/bumpy ci check
        env:
          GH_TOKEN: ${{ github.token }}
